general.import = ["~/.config/alacritty/themes/themes/ayu_dark.toml"]

[window]
padding = { x = 10, y = 10 }
dynamic_title = true

# This is where your picom setup shines
opacity = 0.92
blur = true

[font]
size = 13.0

[font.normal]
family = "JetBrains Mono"
style = "Medium"

[cursor]
style = "Block"
blink_interval = 500

[font.offset]
x = 0
y = 1 # Add a small vertical space between lines
